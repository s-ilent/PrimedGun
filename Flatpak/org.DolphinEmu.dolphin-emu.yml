app-id: org.PrimedGun.PrimedGun
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: primedgun-wrapper
rename-desktop-file: dolphin-emu.desktop
rename-icon: dolphin-emu
finish-args:
  - --device=all
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=x11
  - --share=ipc
  # required for the emulated bluetooth adapter feature to work.
  - --allow=bluetooth
  # required for OpenXR runtime discovery and IPC with SteamVR/Monado.
  - --filesystem=xdg-config/openxr:ro
  - --filesystem=xdg-config/openvr:ro
  - --filesystem=xdg-data/openxr:ro
  - --filesystem=xdg-run/monado_comp_ipc
  - --filesystem=xdg-run/monado_comp_ipc_server
  - --filesystem=xdg-run/steam
  - --filesystem=~/.steam
  - --filesystem=~/.local/share/Steam
  - --filesystem=~/.var/app/com.valvesoftware.Steam/config/openxr:ro
  - --filesystem=~/.var/app/com.valvesoftware.Steam/config/openvr:ro
  - --filesystem=~/.var/app/com.valvesoftware.Steam/data/Steam
  - --filesystem=~/.var/app/com.valvesoftware.Steam/.local/share/Steam
  # required to disable the screensaver in various desktops
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.xfce.ScreenSaver
  - --talk-name=org.mate.ScreenSaver
  # required for Gamescope on Steam Deck
  - --filesystem=xdg-run/gamescope-0:ro
modules:
  # enables motion controls on non-wii controllers (switch, ps4, etc)
  # requires a udev rule enabling Motion Sensors access
  - name: libevdev
    buildsystem: meson
    config-opts:
      - --libdir=lib
      - -Dtests=disabled
      - -Ddocumentation=disabled
    sources:
      - type: archive
        url: https://www.freedesktop.org/software/libevdev/libevdev-1.13.3.tar.xz
        sha256: abf1aace86208eebdd5d3550ffded4c8d73bb405b796d51c389c9d0604cbcfbf
        x-checker-data:
          type: anitya
          project-id: 20540
          stable-only: true
          url-template: https://www.freedesktop.org/software/libevdev/libevdev-$version.tar.xz
  - name: primedgun
    buildsystem: cmake-ninja
    builddir: true
    build-options:
      # don't use any default flags provided by the SDK
      cflags: ""
      cflags-override: true
      cxxflags: "-DXRLOADER_DISABLE_EXCEPTION_HANDLING -DJSON_USE_EXCEPTION=0 -DJSON_USE_EXCEPTIONS=0"
      cxxflags-override: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_ALSA=OFF
      - -DENABLE_SDL=ON
      - -DENABLE_EVDEV=ON
      - -DLIBEVDEV_INCLUDE_DIR=/app/include/libevdev-1.0
      - -DLIBEVDEV_LIBRARY=/app/lib/libevdev.so
      - -DENABLE_VULKAN=ON
      - -DENABLE_VR=ON
      - -DDISTRIBUTOR=PrimedGun
    cleanup:
      - /share/man
    post-install:
      - install -Dm755 ../Flatpak/dolphin-emu-wrapper ${FLATPAK_DEST}/bin/primedgun-wrapper
      - install -d ${FLATPAK_DEST}/bin/assets
      - cp -a ../assets/. ${FLATPAK_DEST}/bin/assets/
      - install -d ${FLATPAK_DEST}/share/dolphin-emu/User/Config
      - cp -a ../Data/User/Config/. ${FLATPAK_DEST}/share/dolphin-emu/User/Config/
      - install -d ${FLATPAK_DEST}/share/dolphin-emu/User/GameSettings
      - cp -a ../Data/User/GameSettings/. ${FLATPAK_DEST}/share/dolphin-emu/User/GameSettings/
      - install -d ${FLATPAK_DEST}/share/dolphin-emu/User/GameSettingsVR
      - cp -a ../Data/User/GameSettingsVR/. ${FLATPAK_DEST}/share/dolphin-emu/User/GameSettingsVR/
      - install -d ${FLATPAK_DEST}/share/dolphin-emu/User/Load
      - cp -a ../Data/User/Load/. ${FLATPAK_DEST}/share/dolphin-emu/User/Load/
      - install -d ${FLATPAK_DEST}/share/dolphin-emu/User/ResourcePacks
      - cp -a ../Data/User/ResourcePacks/. ${FLATPAK_DEST}/share/dolphin-emu/User/ResourcePacks/
      - desktop-file-edit --set-key=Exec --set-value='/app/bin/primedgun-wrapper'
        --set-key=Name --set-value='PrimedGun'
        --set-key=GenericName --set-value='Metroid Prime VR Launcher'
        --set-key=Comment --set-value='A Dolphin ReduX-based VR launcher for Metroid Prime'
        --set-key=Icon --set-value='org.PrimedGun.PrimedGun'
        /app/share/applications/dolphin-emu.desktop
    sources:
      - type: dir
        path: ..
